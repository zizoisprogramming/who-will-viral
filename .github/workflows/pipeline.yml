name: who-will-viral Pipeline

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:

  code-quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
      - run: pip install ruff mypy bandit
      - run: ruff check src/who_will_viral/
      - run: mypy src/who_will_viral/ --ignore-missing-imports --disable-error-code=union-attr --disable-error-code=arg-type --disable-error-code=import-untyped
      - run: bandit -r src/who_will_viral/ -ll

  acquire:
    needs: [code-quality]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
      - run: pip install -r requirements.txt gdown
      - name: Create .env file
        run: |
          echo "YOUTUBE_API_KEY=${{ secrets.YOUTUBE_API_KEY }}" >> .env
          echo "BASE_CSV=./data/youtube/youtube.csv"            >> .env
          echo "OUTPUT_CSV=${{ secrets.OUTPUT_CSV }}"           >> .env
          echo "BACKUP_DIR=${{ secrets.BACKUP_DIR }}"           >> .env
      - name: Create data directories
        run: mkdir -p data/youtube data/raw
      - name: Download base CSV from Google Drive
        run: gdown ${{ secrets.DRIVE_FILE_ID }} -O data/youtube/youtube.csv
      - run: python src/who_will_viral/acquisition.py
      - uses: actions/upload-artifact@v4
        with:
          name: raw-data
          path: data/youtube/youtube_enriched.csv

  validate:
    needs: [acquire]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
      - run: pip install -r requirements.txt
      - name: Create .env file
        run: |
          echo "YOUTUBE_API_KEY=${{ secrets.YOUTUBE_API_KEY }}" >> .env
          echo "BASE_CSV=./data/youtube/youtube.csv"            >> .env
          echo "OUTPUT_CSV=${{ secrets.OUTPUT_CSV }}"           >> .env
          echo "BACKUP_DIR=${{ secrets.BACKUP_DIR }}"           >> .env
      - uses: actions/download-artifact@v4
        with:
          name: raw-data
          path: data/youtube/
      - run: python src/who_will_viral/validate.py
      - uses: actions/upload-artifact@v4
        with:
          name: validated-data
          path: data/validated/

  test:
    needs: [validate]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
      - run: pip install -r requirements.txt pytest pytest-cov
      - name: Create .env file
        run: |
          echo "YOUTUBE_API_KEY=${{ secrets.YOUTUBE_API_KEY }}" >> .env
          echo "BASE_CSV=./data/youtube/youtube.csv"            >> .env
          echo "OUTPUT_CSV=${{ secrets.OUTPUT_CSV }}"           >> .env
          echo "BACKUP_DIR=${{ secrets.BACKUP_DIR }}"           >> .env
      - uses: actions/download-artifact@v4
        with:
          name: validated-data
          path: data/validated/
      - run: pytest tests/ --cov=src --cov-report=xml


