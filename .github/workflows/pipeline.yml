name: who-will-viral Pipeline

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:

  code-quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
      - run: pip install ruff mypy bandit
      - run: ruff check src/who_will_viral/
      - run: mypy src/who_will_viral/ --ignore-missing-imports --disable-error-code=union-attr --disable-error-code=arg-type --disable-error-code=import-untyped --disable-error-code=assignment
      - run: bandit -r src/who_will_viral/ -ll

  test:
    needs: [code-quality]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
      - name: Install Poetry
        run: pip install poetry
      - name: Install dependencies
        run: make install
      - run: pip install pytest pytest-cov pytest-mock python-dotenv
      - name: Create Test .env file
        run: |
          echo "YOUTUBE_API_KEY=dummy_key" >> .env
          echo "HF_TOKEN=dummy_token" >> .env
          echo "MERGED_PATH=dummy.csv" >> .env
          echo "CLEANED_PATH=dummy.csv" >> .env
          echo "TRAIN_PATH=dummy.csv" >> .env
          echo "VAL_PATH=dummy.csv" >> .env
          echo "TEST_PATH=dummy.csv" >> .env
          echo "SCALED_TRAIN_PATH=dummy.csv" >> .env
          echo "SCALED_VAL_PATH=dummy.csv" >> .env
          echo "SCALED_TEST_PATH=dummy.csv" >> .env
      - name: Run Pytest with Coverage
        run: pytest tests/ --cov=src/who_will_viral/ --cov-report=xml --cov-report=term-missing

  validate:
    needs: [test]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
      - name: Install Poetry
        run: pip install poetry
      - name: Install dependencies
        run: make install
      - run: pip install gdown
      - name: Create .env file
        run: |
          echo "YOUTUBE_API_KEY=${{ secrets.YOUTUBE_API_KEY }}" >> .env
          echo "BASE_CSV=./data/youtube/youtube.csv"            >> .env
          echo "OUTPUT_CSV=./data/youtube/youtube_enriched.csv" >> .env
          echo "BACKUP_DIR=./data/youtube/backup"               >> .env
          echo "HF_TOKEN=${{ secrets.HF_TOKEN }}"               >> .env
          echo "CLEANED_PATH=./data/youtube/cleaned_dataset.csv" >> .env
          echo "MERGED_PATH=./data/youtube/dataset.csv"         >> .env
          echo "EXTRACTED_PATH=./data/youtube/extracted.csv"    >> .env
          echo "TRAIN_PATH=./data/youtube/train.csv"            >> .env
          echo "VAL_PATH=./data/youtube/val.csv"                >> .env
          echo "TEST_PATH=./data/youtube/test.csv"              >> .env
          echo "SCALED_TRAIN_PATH=./data/youtube/scaled_train.csv" >> .env
          echo "SCALED_VAL_PATH=./data/youtube/scaled_val.csv"  >> .env
          echo "SCALED_TEST_PATH=./data/youtube/scaled_test.csv" >> .env
      - name: Create data directories
        run: mkdir -p data/youtube data/raw
      - name: Download base CSV from Google Drive
        run: gdown ${{ secrets.MERGED_PATH_DRIVE }} -O data/youtube/youtube.rar
      - run: sudo apt-get install -y unrar
      - run: unrar x data/youtube/youtube.rar data/youtube/
      - name: Run validate
        run: make validate
      - uses: actions/upload-artifact@v4
        with:
          name: raw-data
          path: ./data/youtube/dataset.csv

  clean:
    needs: [validate]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
      - name: Install Poetry
        run: pip install poetry
      - name: Install dependencies
        run: make install
      - name: Create .env file
        run: |
          echo "YOUTUBE_API_KEY=${{ secrets.YOUTUBE_API_KEY }}" >> .env
          echo "BASE_CSV=./data/youtube/youtube.csv"            >> .env
          echo "OUTPUT_CSV=./data/youtube/youtube_enriched.csv" >> .env
          echo "BACKUP_DIR=./data/youtube/backup"               >> .env
          echo "HF_TOKEN=${{ secrets.HF_TOKEN }}"               >> .env
          echo "CLEANED_PATH=./data/youtube/cleaned_dataset.csv" >> .env
          echo "MERGED_PATH=./data/youtube/dataset.csv"         >> .env
          echo "EXTRACTED_PATH=./data/youtube/extracted.csv"    >> .env
          echo "TRAIN_PATH=./data/youtube/train.csv"            >> .env
          echo "VAL_PATH=./data/youtube/val.csv"                >> .env
          echo "TEST_PATH=./data/youtube/test.csv"              >> .env
          echo "SCALED_TRAIN_PATH=./data/youtube/scaled_train.csv" >> .env
          echo "SCALED_VAL_PATH=./data/youtube/scaled_val.csv"  >> .env
          echo "SCALED_TEST_PATH=./data/youtube/scaled_test.csv" >> .env
      - name: Create data directories
        run: mkdir -p data/youtube
      - uses: actions/download-artifact@v4
        with:
          name: raw-data
          path: ./data/youtube/
      - name: Run clean_data
        run: make clean_data
      - uses: actions/upload-artifact@v4
        with:
          name: cleaned-data
          path: ./data/youtube/cleaned_dataset.csv

  validate-clean:
    needs: [clean]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
      - name: Install Poetry
        run: pip install poetry
      - name: Install dependencies
        run: make install
      - name: Create .env file
        run: |
          echo "YOUTUBE_API_KEY=${{ secrets.YOUTUBE_API_KEY }}" >> .env
          echo "BASE_CSV=./data/youtube/youtube.csv"            >> .env
          echo "OUTPUT_CSV=./data/youtube/youtube_enriched.csv" >> .env
          echo "BACKUP_DIR=./data/youtube/backup"               >> .env
          echo "HF_TOKEN=${{ secrets.HF_TOKEN }}"               >> .env
          echo "CLEANED_PATH=./data/youtube/cleaned_dataset.csv" >> .env
          echo "MERGED_PATH=./data/youtube/dataset.csv"         >> .env
          echo "EXTRACTED_PATH=./data/youtube/extracted.csv"    >> .env
          echo "TRAIN_PATH=./data/youtube/train.csv"            >> .env
          echo "VAL_PATH=./data/youtube/val.csv"                >> .env
          echo "TEST_PATH=./data/youtube/test.csv"              >> .env
          echo "SCALED_TRAIN_PATH=./data/youtube/scaled_train.csv" >> .env
          echo "SCALED_VAL_PATH=./data/youtube/scaled_val.csv"  >> .env
          echo "SCALED_TEST_PATH=./data/youtube/scaled_test.csv" >> .env
      - name: Create data directories
        run: mkdir -p data/youtube
      - uses: actions/download-artifact@v4
        with:
          name: cleaned-data
          path: ./data/youtube/
      - name: Run validate_cleaned
        run: make validate_cleaned

  feature-engineering:
    needs: [validate-clean]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
      - name: Install Poetry
        run: pip install poetry
      - name: Install dependencies
        run: make install
      - name: Create .env file
        run: |
          echo "YOUTUBE_API_KEY=${{ secrets.YOUTUBE_API_KEY }}" >> .env
          echo "BASE_CSV=./data/youtube/youtube.csv"            >> .env
          echo "OUTPUT_CSV=./data/youtube/youtube_enriched.csv" >> .env
          echo "BACKUP_DIR=./data/youtube/backup"               >> .env
          echo "HF_TOKEN=${{ secrets.HF_TOKEN }}"               >> .env
          echo "CLEANED_PATH=./data/youtube/cleaned_dataset.csv" >> .env
          echo "MERGED_PATH=./data/youtube/dataset.csv"         >> .env
          echo "EXTRACTED_PATH=./data/youtube/extracted.csv"    >> .env
          echo "TRAIN_PATH=./data/youtube/train.csv"            >> .env
          echo "VAL_PATH=./data/youtube/val.csv"                >> .env
          echo "TEST_PATH=./data/youtube/test.csv"              >> .env
          echo "SCALED_TRAIN_PATH=./data/youtube/scaled_train.csv" >> .env
          echo "SCALED_VAL_PATH=./data/youtube/scaled_val.csv"  >> .env
          echo "SCALED_TEST_PATH=./data/youtube/scaled_test.csv" >> .env
      - name: Create data directories
        run: mkdir -p data/youtube
      - uses: actions/download-artifact@v4
        with:
          name: cleaned-data
          path: ./data/youtube/
      - name: Run feature engineering
        run: make feature
      - uses: actions/upload-artifact@v4
        with:
          name: features-data
          path: ./data/youtube/extracted.csv

  modeling:
    needs: [feature-engineering]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
      - name: Install Poetry
        run: pip install poetry
      - name: Install dependencies
        run: make install
      - name: Create .env file
        run: |
          echo "YOUTUBE_API_KEY=${{ secrets.YOUTUBE_API_KEY }}" >> .env
          echo "BASE_CSV=./data/youtube/youtube.csv"            >> .env
          echo "OUTPUT_CSV=./data/youtube/youtube_enriched.csv" >> .env
          echo "BACKUP_DIR=./data/youtube/backup"               >> .env
          echo "HF_TOKEN=${{ secrets.HF_TOKEN }}"               >> .env
          echo "CLEANED_PATH=./data/youtube/cleaned_dataset.csv" >> .env
          echo "MERGED_PATH=./data/youtube/dataset.csv"         >> .env
          echo "EXTRACTED_PATH=./data/youtube/extracted.csv"    >> .env
          echo "TRAIN_PATH=./data/youtube/train.csv"            >> .env
          echo "VAL_PATH=./data/youtube/val.csv"                >> .env
          echo "TEST_PATH=./data/youtube/test.csv"              >> .env
          echo "SCALED_TRAIN_PATH=./data/youtube/scaled_train.csv" >> .env
          echo "SCALED_VAL_PATH=./data/youtube/scaled_val.csv"  >> .env
          echo "SCALED_TEST_PATH=./data/youtube/scaled_test.csv" >> .env
      - name: Create data directories
        run: mkdir -p data/youtube
      - uses: actions/download-artifact@v4
        with:
          name: features-data
          path: ./data/youtube/
      - name: Run training
        run: make train